<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ A Special Proposal ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff8a8a,#ffb347);
overflow:hidden;
}

.card{
width:360px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(10px);
text-align:center;
color:white;
box-shadow:0 0 25px rgba(0,0,0,.25);
}

h1{
font-size:35px;
margin:15px 0;
}

h2{
margin-bottom:10px;
font-size:22px;
}

p{
margin-bottom:20px;
}

button{
padding:12px 28px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin:12px;
transition:.3s;
}

#yes{
background:#66c7ff;
color:white;
}

#no{
background:white;
position:absolute;
}

#result{
display:none;
font-size:30px;
font-weight:bold;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.heart{
position:absolute;
color:#ff2d55;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>

<body>

<div class="card">

<h3>From: Polash ❤️</h3>

<h1>Will You Forever Be Mine?</h1>

<h2>Dear Mahira Chowdhury Meghla ❤️</h2>

<p>
Every moment with you is special. ❤️<br>
You are the reason behind my smile. 🌹
</p>

<div id="buttons">
<button id="yes">Yes ❤️</button>
<button id="no">No 💙</button>
</div>

<div id="result">
❤️ I LOVE YOU MAHIRA ❤️
<br><br>
🌹 Thank You For Saying YES 🌹
</div>

</div>

<script>

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{
no.style.left=Math.random()*(window.innerWidth-100)+"px";
no.style.top=Math.random()*(window.innerHeight-60)+"px";
});

document.getElementById("yes").onclick=()=>{
document.getElementById("buttons").style.display="none";
document.getElementById("result").style.display="block";
};

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*25)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},300);

</script>

</body>
</html>
